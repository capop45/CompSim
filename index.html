<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM-TEST Alpha 10-2000-S - Ensaio de Compressão (Cena Técnica Completa)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #050505; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/SSAOPass.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/ToneMappingPass.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/SSAOShader.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/ToneMappingShader.js"></script>

    <script>
        // --- GERAÇÃO DE TEXTURAS E GRÁFICOS PROCEDURAIS (sem arquivos externos) ---
        class ProceduralTextures {
            static concrete() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#b0b0b0'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < 50000; i++) {
                    const x = Math.random() * canvas.width; const y = Math.random() * canvas.height;
                    const r = Math.random() * 2; const gray = 140 + Math.random() * 40;
                    ctx.fillStyle = `rgb(${gray},${gray},${gray})`; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                }
                for (let i = 0; i < 5000; i++) {
                    const x = Math.random() * canvas.width; const y = Math.random() * canvas.height;
                    const r = 1 + Math.random() * 3; ctx.fillStyle = 'rgb(100,100,100)'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                }
                return new THREE.CanvasTexture(canvas);
            }

            static concreteBroken() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#808080'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < 5000; i++) {
                    const x = Math.random() * canvas.width; const y = Math.random() * canvas.height;
                    const r = 2 + Math.random() * 8; const gray = 60 + Math.random() * 40;
                    ctx.fillStyle = `rgb(${gray},${gray},${gray})`; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                }
                for (let i = 0; i < 1000; i++) {
                    const x = Math.random() * canvas.width; const y = Math.random() * canvas.height;
                    const r = 5 + Math.random() * 15; ctx.fillStyle = 'rgb(40,40,40)'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                }
                return new THREE.CanvasTexture(canvas);
            }

            static brushedMetal() {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#e0e0e0'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = 1;
                for (let i = 0; i < 2000; i++) {
                    const y = Math.random() * canvas.height;
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y + (Math.random() - 0.5) * 5); ctx.stroke();
                }
                return new THREE.CanvasTexture(canvas);
            }

            static digitalPanel(width = 1024, height = 1024) {
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                const metalTex = ProceduralTextures.brushedMetal();
                ctx.drawImage(metalTex.image, 0, 0, width, height);

                // Textos estáticos
                ctx.fillStyle = '#333'; ctx.font = 'bold 36px Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
                ctx.fillText('Carga Máx (P_max) = 373.44 kN', 50, 100);
                ctx.fillText('Flecha Lateral = 17.36 mm', 50, 160);
                ctx.fillText('Mecanica da Fratura (Curvas Globalizadas)', 50, 260);
                ctx.fillText('Resultados Globais da Simulacao', 50, 310);

                // Gráfico 1: Carga vs. Deslocamento
                ProceduralTextures.drawGraph1(ctx, 50, 360, 430, 400);
                
                // Gráfico 2: Carga vs. Deformação Axial
                ProceduralTextures.drawGraph2(ctx, 520, 360, 430, 400);

                // Barra de status e botões
                ctx.fillStyle = '#ccc'; ctx.fillRect(0, 850, 1024, 174);
                ctx.fillStyle = '#333'; ctx.font = '30px Segoe UI';
                ctx.fillText('Status: Teste Completo - Ruptura Atingida', 300, 910);
                
                ProceduralTextures.drawButton(ctx, 'Play / Pause', 100, 950, 300, 60);
                ProceduralTextures.drawButton(ctx, 'Reset', 624, 950, 300, 60);

                return new THREE.CanvasTexture(canvas);
            }

            static drawButton(ctx, text, x, y, w, h) {
                ctx.fillStyle = '#aaa'; ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
                ctx.fillRect(x, y, w, h); ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = '#333'; ctx.font = 'bold 28px Segoe UI';
                ctx.textAlign = 'center'; ctx.fillText(text, x + w / 2, y + h / 2 + 10); ctx.textAlign = 'left';
            }

            static drawGraph1(ctx, x, y, w, h) {
                // Eixos e Rótulos
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = '#000'; ctx.font = '22px Segoe UI';
                ctx.fillText('Carga Aplicada (kN)', x + 10, y + 30);
                ctx.fillText('Deslocamento (mm)', x + w - 180, y + h - 10);
                ctx.fillText('P_max', x + 300, y + 60);

                // Curvas
                ctx.lineWidth = 3;
                // Esmagamento (Axial) - Azul
                ctx.strokeStyle = '#00f'; ctx.beginPath(); ctx.moveTo(x + 10, y + h - 10);
                // Dados simplificados para a curva
                ctx.lineTo(x + 40, y + h - 180); ctx.lineTo(x + 70, y + h - 350); ctx.lineTo(x + 90, y + h - 373); // Ponto de pico
                ctx.lineTo(x + 110, y + h - 350); ctx.lineTo(x + 140, y + h - 180); ctx.lineTo(x + 170, y + h - 100); ctx.lineTo(x + 400, y + h - 10);
                ctx.stroke();

                // Flecha (Lateral) - Laranja
                ctx.strokeStyle = '#f80'; ctx.beginPath(); ctx.moveTo(x + 10, y + h - 10);
                ctx.lineTo(x + 100, y + h - 100); ctx.lineTo(x + 200, y + h - 250); ctx.lineTo(x + 300, y + h - 370);
                ctx.lineTo(x + 350, y + h - 373); ctx.lineTo(x + 400, y + h - 360); ctx.stroke();

                // Estrelas
                ctx.font = 'bold 36px Segoe UI'; ctx.textAlign = 'center';
                ctx.fillStyle = '#00f'; ctx.fillText('★', x + 90, y + h - 373 + 10);
                ctx.fillStyle = '#f80'; ctx.fillText('★', x + 350, y + h - 373 + 10);
                ctx.textAlign = 'left';

                // Legenda
                ctx.fillStyle = '#000'; ctx.font = '20px Segoe UI';
                ProceduralTextures.drawLegendLine(ctx, x + 330, y + 330, '#00f', 'Esmagamento (Axial)');
                ProceduralTextures.drawLegendLine(ctx, x + 330, y + 360, '#f80', 'Flecha (Lateral)');
            }

            static drawGraph2(ctx, x, y, w, h) {
                // Eixos e Rótulos
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
                ctx.fillStyle = '#000'; ctx.font = '22px Segoe UI';
                ctx.fillText('Carga Aplicada (kN)', x + 10, y + 30);
                ctx.fillText('Deformacao Axial (x10⁻⁶)', x + w - 230, y + h - 10);

                // Curva - Vermelho
                ctx.lineWidth = 3; ctx.strokeStyle = '#f00'; ctx.beginPath(); ctx.moveTo(x + 10, y + h - 10);
                ctx.lineTo(x + 20, y + h - 150); ctx.lineTo(x + 30, y + h - 350); ctx.lineTo(x + 40, y + h - 373); // Ponto de pico
                ctx.lineTo(x + 50, y + h - 350); ctx.lineTo(x + 60, y + h - 150); ctx.lineTo(x + 70, y + h - 80); ctx.lineTo(x + 100, y + h - 30);
                ctx.lineTo(x + 200, y + h - 20); ctx.lineTo(x + 400, y + h - 15); ctx.stroke();
            }

            static drawLegendLine(ctx, x, y, color, text) {
                ctx.fillStyle = color; ctx.fillRect(x, y - 10, 20, 3);
                ctx.fillStyle = '#333'; ctx.fillText(text, x + 25, y);
            }
        }

        // --- MÁQUINA DE ENSAIO DE COMPRESSÃO (Polígonos Complexos Procedurais) ---
        class MachineComponents {
            static base() {
                const group = new THREE.Group();
                // Base principal
                const baseGeometry = new THREE.BoxGeometry(2, 0.4, 1.4);
                const baseMaterial = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 0.1, roughness: 0.7 });
                const baseMesh = new THREE.Mesh(baseGeometry, baseMaterial);
                baseMesh.position.y = 0.2; baseMesh.castShadow = true; baseMesh.receiveShadow = true; group.add(baseMesh);

                // Colunas cromadas (4x)
                const columnGeometry = new THREE.CylinderGeometry(0.12, 0.12, 3.8, 64);
                const columnMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff, metalness: 1, roughness: 0.05, envMapIntensity: 1,
                    clearcoat: 1, clearcoatRoughness: 0.1
                });
                for (let i = 0; i < 4; i++) {
                    const col = new THREE.Mesh(columnGeometry, columnMaterial);
                    col.position.set(i < 2 ? -0.7 : 0.7, 1.9, i % 2 === 0 ? -0.4 : 0.4);
                    col.castShadow = true; group.add(col);
                }

                // Tubulação hidráulica
                const pipeGeometry = new THREE.CylinderGeometry(0.015, 0.015, 1.8, 16);
                const pipeMaterial = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 1, roughness: 0.1 });
                for (let i = 0; i < 2; i++) {
                    const pipe = new THREE.Mesh(pipeGeometry, pipeMaterial);
                    pipe.position.set(i % 2 === 0 ? -0.8 : 0.8, 0.2, 0.6);
                    pipe.rotation.z = Math.PI / 2; group.add(pipe);
                }

                return group;
            }

            static upperCrosshead() {
                const group = new THREE.Group();
                const crossheadGeometry = new THREE.BoxGeometry(2, 0.5, 1.4);
                const crossheadMaterial = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 0.1, roughness: 0.7 });
                const crossheadMesh = new THREE.Mesh(crossheadGeometry, crossheadMaterial);
                crossheadMesh.castShadow = true; crossheadMesh.receiveShadow = true; group.add(crossheadMesh);

                // Prensa Superior (Preto/Verde)
                const platenMaterial = new THREE.MeshPhysicalMaterial({ color: 0x050505, metalness: 0.5, roughness: 0.5 });
                const platenTopMaterial = new THREE.MeshPhysicalMaterial({ color: 0x0a3d2e, metalness: 0.1, roughness: 0.7 });
                
                const platenTopGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.05, 64);
                const platenTop = new THREE.Mesh(platenTopGeometry, platenTopMaterial);
                platenTop.position.y = -0.275; group.add(platenTop);

                const platenGeometry = new THREE.CylinderGeometry(0.28, 0.28, 0.1, 64);
                const platen = new THREE.Mesh(platenGeometry, platenMaterial);
                platen.position.y = -0.35; group.add(platen);

                // Logotipo FORM-TEST (simplificado)
                const logoGeometry = new THREE.PlaneGeometry(0.4, 0.2);
                const logoMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
                const logo = new THREE.Mesh(logoGeometry, logoMaterial);
                logo.position.set(0.6, 0.1, 0.71); group.add(logo);

                // Painel da Máquina Circular
                const circularPanelGeometry = new THREE.CylinderGeometry(0.18, 0.18, 0.01, 64);
                const circularPanelMaterial = new THREE.MeshPhysicalMaterial({ color: 0xe0e0e0, metalness: 0.5, roughness: 0.3, bumpMap: ProceduralTextures.brushedMetal(), bumpScale: 0.005 });
                const circularPanel = new THREE.Mesh(circularPanelGeometry, circularPanelMaterial);
                circularPanel.position.set(-0.2, 0.1, 0.705); circularPanel.rotation.x = Math.PI / 2; group.add(circularPanel);

                return group;
            }

            static baseFios() {
                const group = new THREE.Group();
                const baseFiosMaterial = new THREE.MeshPhysicalMaterial({ color: 0x0a3d2e, metalness: 0.1, roughness: 0.7 });
                const baseFiosGeometry = new THREE.BoxGeometry(0.8, 0.08, 0.8);
                const baseFios = new THREE.Mesh(baseFiosGeometry, baseFiosMaterial);
                baseFios.position.y = 0.44; baseFios.castShadow = true; group.add(baseFios);

                // Conectores dos fios
                const connectorGeometry = new THREE.CylinderGeometry(0.01, 0.01, 0.03, 16);
                const connectorMaterial = new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.3 });
                for (let i = 0; i < 16; i++) {
                    const conn = new THREE.Mesh(connectorGeometry, connectorMaterial);
                    conn.position.set(-0.35 + (i % 8) * 0.1, 0.485, i < 8 ? -0.35 : 0.35); group.add(conn);
                }

                return group;
            }
        }

        // --- CORPO DE PROVA DE CONCRETO (Texturas Procedurais Realistas) ---
        class ConcreteSpecimen {
            static create() {
                const group = new THREE.Group();
                const concreteMaterial = new THREE.MeshPhysicalMaterial({
                    map: ProceduralTextures.concrete(),
                    bumpMap: ProceduralTextures.concrete Broken(), bumpScale: 0.01,
                    displacementMap: ProceduralTextures.concrete Broken(), displacementScale: 0.01,
                    metalness: 0, roughness: 0.9, color: 0xd0d0d0
                });

                // Bloco de concreto principal (quebrado)
                const concreteGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.8, 64, 10, false, 0, Math.PI * 2);
                const concrete = new THREE.Mesh(concreteGeometry, concreteMaterial);
                concrete.position.y = 0.88; concrete.castShadow = true; concrete.receiveShadow = true; group.add(concrete);

                // Ruptura procedural - Geometry complexa
                const brokenGeometry = new THREE.CylinderGeometry(0.18, 0.2, 0.4, 64, 20, false, 0, Math.PI * 2);
                const brokenMaterial = new THREE.MeshPhysicalMaterial({
                    map: ProceduralTextures.concreteBroken(), bumpMap: ProceduralTextures.concreteBroken(), bumpScale: 0.05,
                    metalness: 0, roughness: 1.0, color: 0x808080
                });
                const brokenSection = new THREE.Mesh(brokenGeometry, brokenMaterial);
                brokenSection.position.y = 1.08; group.add(brokenSection);

                // Detritos e Poeira
                const debrisGeometry = new THREE.DodecahedronGeometry(0.01, 0);
                for (let i = 0; i < 200; i++) {
                    const d = new THREE.Mesh(debrisGeometry, concreteMaterial);
                    const angle = Math.random() * Math.PI * 2; const dist = 0.15 + Math.random() * 0.1;
                    d.position.set(Math.cos(angle) * dist, 0.48, Math.sin(angle) * dist);
                    d.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI); group.add(d);
                }

                // Texto no Concreto (25.04.18 e KpM 30)
                const loader = new THREE.FontLoader();
                // Three.js FontLoader requer uma fonte externa ou embutida. Para este exemplo sem arquivos,
                // usaremos uma textura de texto procedural ou geometry simplificada.
                const textMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                ConcreteSpecimen.addText(group, '25.04.18', -0.1, 0.7, 0.21, textMaterial);
                ConcreteSpecimen.addText(group, 'KpM 30', -0.1, 0.6, 0.21, textMaterial);

                return group;
            }

            static addText(group, text, x, y, z, material) {
                // Geometry de texto simplificada para este exemplo sem arquivos de fonte
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px Segoe UI'; ctx.fillText(text, 10, 50);
                const texture = new THREE.CanvasTexture(canvas);
                const geometry = new THREE.PlaneGeometry(0.2, 0.05);
                const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ map: texture, transparent: true, alphaTest: 0.5 }));
                mesh.position.set(x, y, z); group.add(mesh);
            }
        }

        // --- SENSORES E FIAÇÃO COMPLEXA (Curvas Procedurais) ---
        class SensorsAndWiring {
            static create() {
                const group = new THREE.Group();
                const wireMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                for (let i = 0; i < 32; i++) {
                    // Curva procedural para fiação
                    const points = [];
                    points.push(new THREE.Vector3(-0.35 + (i % 8) * 0.1, 0.485, i < 8 ? -0.35 : 0.35)); // Conector base
                    points.push(new THREE.Vector3(new THREE.MathUtils.randFloatSpread(0.6), new THREE.MathUtils.randFloat(0.5, 0.8), i < 8 ? -0.3 : 0.3)); // Meio
                    points.push(new THREE.Vector3(new THREE.MathUtils.randFloatSpread(0.2), new THREE.MathUtils.randFloat(0.6, 1.1), new THREE.MathUtils.randFloatSpread(0.2))); // No concreto

                    const curve = new THREE.CatmullRomCurve3(points);
                    const tubeGeometry = new THREE.TubeGeometry(curve, 32, 0.003, 8, false);
                    const tube = new THREE.Mesh(tubeGeometry, wireMaterial); group.add(tube);
                }
                return group;
            }
        }

        // --- CONFIGURAÇÃO DA CENA PRINCIPAL ---
        class App {
            constructor() {
                this.init(); this.addObjects(); this.addPostProcessing(); this.animate();
            }

            init() {
                this.container = document.getElementById('container');
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / (window.innerHeight * 0.8), 0.1, 1000); // Proporção para acomodar o painel
                this.camera.position.set(4, 3, 5); this.scene.add(this.camera);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight * 0.8);
                this.renderer.setClearColor(0x050505); this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap; this.container.appendChild(this.renderer.domElement);
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.target.set(0, 1.5, 0); this.controls.update();

                // Iluminação
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.2));
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(2, 5, 2); directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 2048; directionalLight.shadow.mapSize.height = 2048;
                directionalLight.shadow.camera.near = 0.5; directionalLight.shadow.camera.far = 20; this.scene.add(directionalLight);

                const spotLight = new THREE.SpotLight(0xffffff, 1);
                spotLight.position.set(-3, 6, 4); spotLight.angle = Math.PI / 4; spotLight.castShadow = true; this.scene.add(spotLight);

                // Environment Map procedural (simulando laboratório)
                new THREE.RGBELoader().load('https://unpkg.com/three@0.160.0/examples/textures/equirectangular/venice_sunset_1k.hdr', (texture) => {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    this.scene.environment = texture;
                });
            }

            addObjects() {
                this.base = MachineComponents.base(); this.scene.add(this.base);
                this.crosshead = MachineComponents.upperCrosshead();
                this.crosshead.position.y = 3.6; this.scene.add(this.crosshead);
                this.fiosBase = MachineComponents.baseFios(); this.scene.add(this.fiosBase);
                this.concreteSpecimen = ConcreteSpecimen.create(); this.scene.add(this.concreteSpecimen);
                this.wiring = SensorsAndWiring.create(); this.scene.add(this.wiring);

                // Painel de Controle Digital (Painel Direito)
                const panelGroup = new THREE.Group();
                const panelMaterial = new THREE.MeshPhysicalMaterial({
                    map: ProceduralTextures.digitalPanel(1024, 1024),
                    bumpMap: ProceduralTextures.brushedMetal(), bumpScale: 0.005,
                    metalness: 0.5, roughness: 0.3
                });
                const panelGeometry = new THREE.PlaneGeometry(2.5, 2.5);
                this.digitalPanelMesh = new THREE.Mesh(panelGeometry, panelMaterial);
                this.digitalPanelMesh.position.set(3, 1.5, -1); // Posicionamento à direita da máquina
                this.digitalPanelMesh.rotation.y = -Math.PI / 4; this.scene.add(this.digitalPanelMesh);

                // Configurar Raycaster para interação com botões
                this.raycaster = new THREE.Raycaster(); this.mouse = new THREE.Vector2();
                window.addEventListener('click', this.onClick.bind(this));
            }

            addPostProcessing() {
                this.composer = new THREE.EffectComposer(this.renderer);
                this.composer.addPass(new THREE.RenderPass(this.scene, this.camera));
                this.ssaoPass = new THREE.SSAOPass(this.scene, this.camera, window.innerWidth, window.innerHeight);
                this.ssaoPass.kernelRadius = 16; this.ssaoPass.minDistance = 0.005; this.ssaoPass.maxDistance = 0.1; this.composer.addPass(this.ssaoPass);
                this.composer.addPass(new THREE.ToneMappingPass(THREE.ACESFilmicToneMapping, 1));
            }

            onClick(event) {
                this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(event.clientY / (window.innerHeight * 0.8)) * 2 + 1;
                this.raycaster.setFromCamera(this.mouse, this.camera);
                // Three.js Pure raycasting nbotões no painel é complexo sem geometry de botão físico.
                // Como este exemplo não tem botões físicos renderizados, simularemos com a barra de status.
                // Tratar como um exemplo técnico de interação.
                console.log('Click detectado');
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                this.controls.update(); this.composer.render();
            }
        }

        new App();
    </script>
</body>
</html>
