<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Ensaio de Compressão</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333333;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --border-color: #dddddd;
            --accent-color: #0055aa;
        }

        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --panel-bg: rgba(30, 30, 30, 0.95);
            --border-color: #444444;
            --accent-color: #4da6ff;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        
        canvas { display: block; outline: none; }

        /* Camada de UI Principal */
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; display: flex; justify-content: space-between;
            box-sizing: border-box; padding: 20px;
        }

        .panel {
            pointer-events: auto;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            overflow-y: auto;
        }

        /* Painel Esquerdo (Configurações) */
        #settings-panel { width: 300px; }
        
        /* Painel Direito (Dashboard) */
        #dashboard { width: 340px; position: relative; }

        .section-title { font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .input-group input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent-color); }
        .input-group input[type="number"] { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid var(--border-color); border-radius: 4px; background: transparent; color: var(--text-color); font-weight: bold; }

        .metric-card { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .metric-label { font-size: 12px; opacity: 0.8; text-transform: uppercase; }
        .metric-value { font-size: 18px; font-weight: bold; color: var(--accent-color); }

        #graph-container { width: 100%; height: 180px; background: transparent; margin-top: 10px; flex-shrink: 0; }

        /* Controles Inferiores */
        #controls-bottom {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; pointer-events: auto; z-index: 10;
        }

        #top-left-controls { position: absolute; top: 20px; left: 20px; pointer-events: auto; z-index: 10; display: none; } /* Oculto no desktop, painel cobre */

        button {
            padding: 12px 20px; font-size: 14px; font-weight: bold; cursor: pointer;
            border: 1px solid var(--border-color); border-radius: 5px;
            background: var(--panel-bg); color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s; text-transform: uppercase;
        }

        button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #btn-play { background: var(--accent-color); color: white; border: none; min-width: 160px; }
        #btn-play.paused { background: #28a745; }
        #btn-aplicar { background: #666; color: white; border: none; width: 100%; margin-top: 10px; }
        
        #status-ensaio {
            text-align: center; font-weight: bold; color: #d9534f; font-size: 16px; 
            margin-bottom: 10px; opacity: 0; transition: opacity 0.3s; text-transform: uppercase;
        }

        /* Responsividade para Celulares (Mobile) */
        @media (max-width: 768px) {
            #ui-layer { 
                flex-direction: column; padding: 10px; justify-content: flex-start; gap: 10px;
                overflow-y: auto; pointer-events: auto; /* Permite rolar a tela toda */
            }
            
            .panel { width: 100%; max-height: none; overflow: visible; box-shadow: none; border-width: 2px; }
            #dashboard { order: -1; } /* Dashboard em cima no mobile */
            
            #controls-bottom {
                position: relative; bottom: auto; left: auto; transform: none;
                width: 100%; justify-content: center; margin-top: 10px; margin-bottom: 20px;
            }
            
            #btn-theme-mobile { width: 100%; margin-top: 10px; }
            #top-left-controls { display: none; }
            canvas { position: fixed; top: 0; left: 0; z-index: -1; } /* 3D fica fixo no fundo */
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="settings-panel" class="panel">
            <button id="btn-theme">Alternar Tema</button>
            <div class="section-title" style="margin-top: 15px;">Corpo de Prova</div>
            
            <div class="input-group">
                <label>Largura (m): <span id="out-larg">0.20</span></label>
                <input type="range" id="in-larg" min="0.10" max="0.40" step="0.02" value="0.20">
            </div>
            <div class="input-group">
                <label>Altura (m): <span id="out-alt">2.50</span></label>
                <input type="range" id="in-alt" min="1.00" max="3.50" step="0.10" value="2.50">
            </div>
            <div class="input-group">
                <label>Profundidade (m): <span id="out-prof">0.20</span></label>
                <input type="range" id="in-prof" min="0.10" max="0.40" step="0.02" value="0.20">
            </div>
            
            <div class="section-title" style="margin-top: 10px;">Limites Estruturais</div>
            <div class="input-group">
                <label>Carga Máxima (kN):</label>
                <input type="number" id="in-carga" value="373.44" min="10" max="2000" step="10">
            </div>
            <div class="input-group">
                <label>Flecha Máxima (mm):</label>
                <input type="number" id="in-flecha" value="17.36" min="1" max="100" step="1">
            </div>
            <button id="btn-aplicar">Aplicar Alterações</button>
        </div>

        <div id="dashboard" class="panel">
            <div id="status-ensaio">Status Aqui</div>
            <div class="section-title">Mecânica da Fratura</div>
            
            <div class="metric-card"><span class="metric-label">Carga Atual (P)</span><span id="val-carga" class="metric-value">0.00 kN</span></div>
            <div class="metric-card"><span class="metric-label">Deslocamento</span><span id="val-desloc" class="metric-value">0.00 mm</span></div>
            <div class="metric-card" style="border-bottom: none;"><span class="metric-label" style="color: #d9534f;">Carga Máx</span><span id="val-carga-max" class="metric-value" style="color: #d9534f;">373.44 kN</span></div>

            <canvas id="graph-canvas"></canvas>
        </div>
    </div>

    <div id="controls-bottom">
        <button id="btn-play">INICIAR ENSAIO</button>
        <button id="btn-reset">RESET</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // --- REFERÊNCIAS DO DOM ---
        const btnTheme = document.getElementById('btn-theme');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');
        const btnAplicar = document.getElementById('btn-aplicar');
        
        const inLarg = document.getElementById('in-larg');
        const inAlt = document.getElementById('in-alt');
        const inProf = document.getElementById('in-prof');
        const inCarga = document.getElementById('in-carga');
        const inFlecha = document.getElementById('in-flecha');
        
        const outLarg = document.getElementById('out-larg');
        const outAlt = document.getElementById('out-alt');
        const outProf = document.getElementById('out-prof');
        const valCargaMax = document.getElementById('val-carga-max');

        const valCarga = document.getElementById('val-carga');
        const valDesloc = document.getElementById('val-desloc');
        const canvasGraph = document.getElementById('graph-canvas');
        const ctx = canvasGraph.getContext('2d');
        const statusEnsaio = document.getElementById('status-ensaio');

        // --- VARIÁVEIS DE SIMULAÇÃO ---
        let larguraPilar = 0.20;
        let alturaPilar = 2.50;
        let profundidadePilar = 0.20;
        let cargaMaxima = 373.44;
        let flechaMaxima = 17.36;
        let maxGraficoY = cargaMaxima * 1.2; 

        const posPilarBase = 0.6;
        const vaoInicial = 0.3;
        let posPrensaContato = posPilarBase + alturaPilar + 0.15; 
        let posPrensaDescanso = posPrensaContato + vaoInicial;
        const maxDeslocamentoY = 0.05; 
        
        let estado = 'PARADO'; 
        let frameGrafico = 0; 
        const framePico = 150; 
        const duracaoRompimento = 60; 
        const dadosCarga = [];
        let isDarkMode = localStorage.getItem('theme') === 'dark';

        // --- CONFIGURAÇÃO THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Otimiza performance no mobile
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        // Desabilita pan com botão direito para não bugar no mobile
        controls.enablePan = false;
        controls.update();

        // --- GERENCIAMENTO DE TEMA ---
        function applyTheme(dark) {
            if (dark) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                if(scene) scene.background = new THREE.Color(0x1a1a1a);
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
                if(scene) scene.background = new THREE.Color(0xdadad9);
            }
            isDarkMode = dark;
            desenharGrafico();
        }
        btnTheme.addEventListener('click', () => applyTheme(!isDarkMode));

        // Sincroniza labels
        inLarg.addEventListener('input', e => outLarg.innerText = parseFloat(e.target.value).toFixed(2));
        inAlt.addEventListener('input', e => outAlt.innerText = parseFloat(e.target.value).toFixed(2));
        inProf.addEventListener('input', e => outProf.innerText = parseFloat(e.target.value).toFixed(2));

        // --- ILUMINAÇÃO ---
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
        const luzDirecional = new THREE.DirectionalLight(0xffffff, 2);
        luzDirecional.position.set(5, 10, 5);
        luzDirecional.castShadow = true;
        luzDirecional.shadow.mapSize.width = 1024; // Otimizado
        luzDirecional.shadow.mapSize.height = 1024;
        scene.add(luzDirecional);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- TEXTURAS PROCEDURAIS ---
        const canvasConcreto = document.createElement('canvas');
        canvasConcreto.width = 512; canvasConcreto.height = 512;
        const ctxConc = canvasConcreto.getContext('2d');
        for(let i=0; i<512; i+=25) {
            for(let j=0; j<512; j+=2) {
                const val = 130 + Math.floor(Math.random() * 40);
                ctxConc.fillStyle = `rgb(${val},${val},${val})`;
                ctxConc.fillRect(i, j, 25, 2);
            }
        }
        
        const canvasRompido = document.createElement('canvas');
        canvasRompido.width = 512; canvasRompido.height = 512;
        const ctxRomp = canvasRompido.getContext('2d');
        ctxRomp.drawImage(canvasConcreto, 0, 0);
        const texConcretoDinâmico = new THREE.CanvasTexture(canvasRompido);

        const caminhosRachadura = [];
        for(let k=0; k<35; k++) { 
            let caminho = [];
            let x = Math.random() * 512;
            let y = Math.random() * 80; // Rachaduras descem mais
            caminho.push({x, y});
            for(let step=0; step<5 + Math.random() * 8; step++) {
                x += (Math.random() - 0.5) * 50;
                y += Math.random() * 20 + 5; 
                caminho.push({x, y});
            }
            caminhosRachadura.push(caminho);
        }

        const canvasMetal = document.createElement('canvas');
        canvasMetal.width = 256; canvasMetal.height = 256;
        const ctxMetal = canvasMetal.getContext('2d');
        ctxMetal.fillStyle = '#808080'; ctxMetal.fillRect(0,0,256,256);
        for(let i=0; i<1000; i++) {
            ctxMetal.fillStyle = `rgba(255,255,255,${Math.random()*0.15})`;
            ctxMetal.fillRect(0, Math.random()*256, 256, 1);
            ctxMetal.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
            ctxMetal.fillRect(0, Math.random()*256, 256, 1);
        }
        const texMetal = new THREE.CanvasTexture(canvasMetal);

        // --- MATERIAIS ---
        const matEstrutura = new THREE.MeshPhysicalMaterial({ color: 0xe0e0e0, roughness: 0.4, clearcoat: 0.5 });
        const matCromoRanhurado = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.3, bumpMap: texMetal, bumpScale: 0.003 });
        const matCromoLiso = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.1 });
        const matPratoVerde = new THREE.MeshPhysicalMaterial({ color: 0x007a4d, metalness: 0.5, roughness: 0.4, bumpMap: texMetal, bumpScale: 0.001 });
        const matPilar = new THREE.MeshStandardMaterial({ color: 0x959595, roughness: 1.0, map: texConcretoDinâmico, bumpMap: texConcretoDinâmico, bumpScale: 0.02 });

        // --- MODELAGEM DA MÁQUINA ---
        const maquina = new THREE.Group();
        scene.add(maquina);

        const base = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 1.2), matEstrutura);
        base.position.y = 0.2; base.receiveShadow = true; base.castShadow = true; maquina.add(base);
        
        const pratoInf = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.8), matPratoVerde);
        pratoInf.position.y = 0.5; pratoInf.castShadow = true; pratoInf.receiveShadow = true; maquina.add(pratoInf);

        const topo = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 1.2), matEstrutura);
        topo.position.y = 4.2; topo.receiveShadow = true; topo.castShadow = true; maquina.add(topo);
        
        const posColunas = [[-0.75, 0.45], [0.75, 0.45], [-0.75, -0.45], [0.75, -0.45]];
        posColunas.forEach(pos => {
            const coluna = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 4.4, 32), matCromoLiso);
            coluna.position.set(pos[0], 2.2, pos[1]); coluna.castShadow = true; coluna.receiveShadow = true; maquina.add(coluna);
        });

        const conjuntoMovelSuperior = new THREE.Group();
        const cilindroHidraulico = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 1.0, 32), matCromoRanhurado);
        cilindroHidraulico.position.y = 0.5; cilindroHidraulico.castShadow = true; conjuntoMovelSuperior.add(cilindroHidraulico);
        
        const pratoSup = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.15, 0.8), matPratoVerde);
        pratoSup.position.y = -0.075; pratoSup.castShadow = true; pratoSup.receiveShadow = true; conjuntoMovelSuperior.add(pratoSup);
        conjuntoMovelSuperior.position.y = posPrensaDescanso;
        maquina.add(conjuntoMovelSuperior);

        // --- CRIAÇÃO DO PILAR COM TOPO IRREGULAR ("QUEBRADO") ---
        let pilar;
        function gerarPilar() {
            if(pilar) {
                scene.remove(pilar);
                pilar.geometry.dispose();
            }
            // Usa mais segmentos verticais (16) e horizontais (8) para poder entortar os vértices
            const geo = new THREE.BoxGeometry(larguraPilar, alturaPilar, profundidadePilar, 8, 16, 8);
            const pos = geo.attributes.position;
            
            // Lógica para amassar o topo
            for(let i = 0; i < pos.count; i++) {
                let y = pos.getY(i);
                // Se o vértice estiver na face superior (margem de erro para float)
                if (y > (alturaPilar / 2) - 0.01) {
                    // Desce o vértice aleatoriamente (até 8cm), criando buracos/irregularidades
                    pos.setY(i, y - (Math.random() * 0.08));
                }
            }
            geo.computeVertexNormals(); // Recalcula a luz para a nova forma
            geo.translate(0, alturaPilar / 2, 0); // Joga o pivô pra base
            
            pilar = new THREE.Mesh(geo, matPilar);
            pilar.castShadow = true; pilar.receiveShadow = true;
            pilar.position.y = posPilarBase; 
            scene.add(pilar);
        }
        
        gerarPilar(); // Chama na inicialização

        // Detritos
        const particulas = [];
        const detritoGeo = new THREE.BoxGeometry(0.04, 0.04, 0.04);
        for(let i=0; i<40; i++) {
            const p = new THREE.Mesh(detritoGeo, matPilar);
            p.castShadow = true; p.visible = false; scene.add(p);
            particulas.push({ mesh: p, vx: 0, vy: 0, vz: 0, ativo: false });
        }

        const chao = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.ShadowMaterial({ opacity: 0.3 }));
        chao.rotation.x = -Math.PI / 2; chao.receiveShadow = true; scene.add(chao);


        // --- LÓGICA DE APLICAÇÃO DE PARÂMETROS ---
        btnAplicar.addEventListener('click', () => {
            larguraPilar = Math.max(0.1, Math.min(0.4, parseFloat(inLarg.value)));
            alturaPilar = Math.max(1.0, Math.min(3.5, parseFloat(inAlt.value)));
            profundidadePilar = Math.max(0.1, Math.min(0.4, parseFloat(inProf.value)));
            cargaMaxima = Math.max(10, Math.min(2000, parseFloat(inCarga.value)));
            flechaMaxima = Math.max(1, Math.min(100, parseFloat(inFlecha.value)));
            maxGraficoY = cargaMaxima * 1.2;

            gerarPilar(); // Recria com o topo quebrado e novas dimensões

            posPrensaContato = posPilarBase + alturaPilar + 0.15; 
            posPrensaDescanso = posPrensaContato + vaoInicial;
            conjuntoMovelSuperior.position.y = posPrensaDescanso;

            valCargaMax.innerText = `${cargaMaxima.toFixed(2)} kN`;
            btnReset.click(); 
        });

        // --- LÓGICA DE UI E GRÁFICO ---
        function resizeCanvas() { 
            // Garante que o canvas do gráfico pegue o tamanho do pai corretamente no resize
            const container = canvasGraph.parentElement;
            canvasGraph.width = container.clientWidth - 30; 
            canvasGraph.height = 180; 
            desenharGrafico(); 
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });
        setTimeout(resizeCanvas, 100);

        function updateStatus(texto, mostrar = true) {
            statusEnsaio.innerText = texto;
            statusEnsaio.style.opacity = mostrar ? '1' : '0';
        }

        btnPlay.addEventListener('click', () => {
            if(estado === 'PARADO') estado = 'APROXIMANDO';
            else if(estado === 'APROXIMANDO' || estado === 'COMPRIMINDO' || estado === 'ROMPENDO') estado = 'PAUSADO';
            else if(estado === 'PAUSADO') {
                if(conjuntoMovelSuperior.position.y > posPrensaContato) estado = 'APROXIMANDO';
                else if(frameGrafico < framePico) estado = 'COMPRIMINDO';
                else estado = 'RETORNANDO';
            }
            
            const rodando = (estado !== 'PARADO' && estado !== 'PAUSADO' && estado !== 'RETORNANDO');
            btnPlay.innerText = rodando ? "PAUSAR" : "RETOMAR";
            btnPlay.className = rodando ? "paused" : "";
            
            btnAplicar.disabled = (estado !== 'PARADO');
            Array.from(document.querySelectorAll('#settings-panel input')).forEach(inp => inp.disabled = (estado !== 'PARADO'));
        });

        btnReset.addEventListener('click', () => {
            estado = 'PARADO'; frameGrafico = 0; dadosCarga.length = 0;
            
            pilar.scale.set(1, 1, 1);
            conjuntoMovelSuperior.position.y = posPrensaDescanso;
            
            ctxRomp.drawImage(canvasConcreto, 0, 0);
            texConcretoDinâmico.needsUpdate = true;

            particulas.forEach(p => { p.ativo = false; p.mesh.visible = false; });
            
            updateStatus('', false);
            btnPlay.innerText = "INICIAR ENSAIO"; btnPlay.className = "";
            
            btnAplicar.disabled = false;
            Array.from(document.querySelectorAll('#settings-panel input')).forEach(inp => inp.disabled = false);

            desenharGrafico();
            valCarga.innerText = `0.00 kN`; valDesloc.innerText = `0.00 mm`;
        });

        function desenharGrafico() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvasGraph.width, canvasGraph.height);
            ctx.strokeStyle = isDarkMode ? '#666666' : '#cccccc'; ctx.lineWidth = 1; ctx.beginPath();
            ctx.moveTo(30, 10); ctx.lineTo(30, 160); ctx.lineTo(canvasGraph.width - 10, 160); ctx.stroke();

            if(dadosCarga.length < 2) return;
            ctx.strokeStyle = isDarkMode ? '#4da6ff' : '#0055aa'; ctx.lineWidth = 2; ctx.beginPath();
            const w = canvasGraph.width - 40;
            for(let i=0; i<dadosCarga.length; i++) {
                const x = 30 + (i / 250) * w; 
                const y = 160 - (dadosCarga[i] / maxGraficoY) * 140;
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        applyTheme(isDarkMode); 

        // --- LOOP PRINCIPAL DE ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);

            if (estado === 'APROXIMANDO') {
                updateStatus('Aproximando Prensa...', true);
                conjuntoMovelSuperior.position.y -= 0.008; 
                
                if (conjuntoMovelSuperior.position.y <= posPrensaContato) {
                    conjuntoMovelSuperior.position.y = posPrensaContato;
                    estado = 'COMPRIMINDO';
                    updateStatus('Aplicando Carga...', true);
                }

            } else if (estado === 'COMPRIMINDO' || estado === 'ROMPENDO' || estado === 'RETORNANDO') {
                
                let cargaAtual = 0; let flechaAtual = 0;

                if (estado === 'COMPRIMINDO') {
                    frameGrafico++;
                    const progresso = frameGrafico / framePico;
                    
                    cargaAtual = Math.sin(progresso * Math.PI / 2) * cargaMaxima; 
                    flechaAtual = progresso * (flechaMaxima * 0.15); 
                    
                    const descidaVisual = progresso * maxDeslocamentoY;
                    conjuntoMovelSuperior.position.y = posPrensaContato - descidaVisual;
                    pilar.scale.y = 1 - (descidaVisual / alturaPilar);

                    if(frameGrafico >= framePico) {
                        estado = 'ROMPENDO';
                        updateStatus('RUPTURA ESTRUTURAL!', true);
                        
                        particulas.forEach(p => {
                            p.ativo = true; p.mesh.visible = true;
                            p.mesh.position.set(
                                (Math.random() - 0.5) * larguraPilar, 
                                posPilarBase + alturaPilar - (Math.random() * 0.4),
                                (Math.random() - 0.5) * profundidadePilar
                            );
                            p.vx = (Math.random() - 0.5) * 0.05;
                            p.vy = (Math.random() * 0.03) + 0.01;
                            p.vz = (Math.random() - 0.5) * 0.05;
                        });
                    }

                } else if (estado === 'ROMPENDO') {
                    frameGrafico++;
                    const framesPosRuptura = frameGrafico - framePico;
                    cargaAtual = cargaMaxima * Math.exp(-framesPosRuptura * 0.15);
                    flechaAtual = flechaMaxima;

                    if (framesPosRuptura < duracaoRompimento) {
                        const progressoRachadura = framesPosRuptura / duracaoRompimento;
                        ctxRomp.drawImage(canvasConcreto, 0, 0); 
                        ctxRomp.lineWidth = 5; ctxRomp.strokeStyle = '#111';
                        
                        caminhosRachadura.forEach(caminho => {
                            ctxRomp.beginPath(); ctxRomp.moveTo(caminho[0].x, caminho[0].y);
                            let limite = Math.floor(progressoRachadura * caminho.length);
                            for(let i=1; i<=limite; i++) {
                                if(i < caminho.length) ctxRomp.lineTo(caminho[i].x, caminho[i].y);
                            }
                            ctxRomp.stroke();
                        });
                        texConcretoDinâmico.needsUpdate = true; 
                    }

                    if (framesPosRuptura > duracaoRompimento + 40) {
                        estado = 'RETORNANDO';
                        updateStatus('Retraindo...', true);
                    }

                } else if (estado === 'RETORNANDO') {
                    cargaAtual = 0; flechaAtual = flechaMaxima;
                    conjuntoMovelSuperior.position.y += 0.01;
                    if (conjuntoMovelSuperior.position.y >= posPrensaDescanso) {
                        conjuntoMovelSuperior.position.y = posPrensaDescanso;
                        estado = 'PARADO';
                        updateStatus('Ensaio Finalizado', true);
                        btnPlay.innerText = "ENSAIO CONCLUÍDO"; btnPlay.className = "";
                    }
                }

                particulas.forEach(p => {
                    if(p.ativo) {
                        p.vy -= 0.002;
                        p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
                        p.mesh.rotation.x += 0.1; p.mesh.rotation.y += 0.1;
                        
                        let stopY = 0.02; 
                        if (Math.abs(p.mesh.position.x) < 0.4 && Math.abs(p.mesh.position.z) < 0.4) stopY = posPilarBase + 0.02;
                        else if (Math.abs(p.mesh.position.x) < 0.9 && Math.abs(p.mesh.position.z) < 0.6) stopY = 0.4 + 0.02; 

                        if(p.mesh.position.y <= stopY) {
                            p.mesh.position.y = stopY;
                            p.vy *= -0.3; p.vx *= 0.8; p.vz *= 0.8;
                            if(Math.abs(p.vy) < 0.005) { p.vy = 0; p.vx = 0; p.vz = 0; }
                        }
                    }
                });

                if(cargaAtual < 0.5) cargaAtual = 0;

                valCarga.innerText = `${cargaAtual.toFixed(2)} kN`;
                valDesloc.innerText = `${flechaAtual.toFixed(2)} mm`;
                
                if (estado !== 'RETORNANDO') { 
                    dadosCarga.push(cargaAtual);
                    if(frameGrafico % 2 === 0) desenharGrafico(); 
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
